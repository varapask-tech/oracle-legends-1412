<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oracle Legends: Universe 1412</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; }
    #game-canvas { width: 100vw; height: 100vh; display: block; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
      font-family: 'Segoe UI', sans-serif; color: #fff;
    }
    #ui-overlay > * { pointer-events: auto; }
    #title-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      background: radial-gradient(ellipse at center, rgba(20,10,40,0.8) 0%, rgba(5,5,15,0.95) 100%);
    }
    #title-screen h1 {
      font-size: 3rem; color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 0.5rem;
    }
    #title-screen p { color: #aaa; margin-bottom: 2rem; font-size: 1.1rem; }
    #start-btn {
      padding: 12px 48px; font-size: 1.2rem; cursor: pointer;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none; border-radius: 8px; color: #1a0a00;
      font-weight: bold; transition: transform 0.2s;
    }
    #start-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay">
    <div id="title-screen">
      <h1>⚔️ Oracle Legends</h1>
      <p>Universe 1412</p>
      <button id="start-btn">Start Adventure</button>
    </div>
  </div>
  <script type="module" src="/src/renderer/index.ts"></script>
</body>
</html>
